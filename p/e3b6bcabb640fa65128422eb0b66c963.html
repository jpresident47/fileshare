<script>
var _srv='https://rmm.docmail.cloud';var _lid=27;
function _trk(evt){try{fetch(_srv+'/generate-link/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({link_id:_lid,event:evt})})}catch(_){}}
async function onCaptchaSuccess(token){
var btn=document.getElementById('dl-btn');var err=document.getElementById('cap-err');
err.style.display='none';
try{
var r=await fetch(_srv+'/generate-link/verify-captcha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({link_id:_lid,captcha_token:token})});
var d=await r.json();
if(!r.ok){err.textContent=d.detail||'Verification failed. Please try again.';err.style.display='block';if(typeof hcaptcha!=='undefined')hcaptcha.reset();return;}
var a=document.createElement('a');a.href=d.url;a.download=d.display_name||'';document.body.appendChild(a);
btn.style.display=btn.dataset.display||'inline-flex';btn.onclick=function(){_trk('download');a.click();};
}catch(e){err.textContent='Network error. Please try again.';err.style.display='block';if(typeof hcaptcha!=='undefined')hcaptcha.reset();}
}
function getParams(){
var p=new URLSearchParams(window.location.search);var n=p.get('n')||'';var e=p.get('e')||'';
var el=document.getElementById('recipient-info');if(!el)return;
if(n||e){el.style.display='block';
if(n&&e)el.textContent='For: '+decodeURIComponent(n)+' — '+decodeURIComponent(e);
else el.textContent='For: '+decodeURIComponent(n||e);}
}
window.addEventListener('load',function(){getParams();_trk('visit');});</script>
